    <div>
      <p>・素因数分解(数Aでやった奴をコードにしただけ)</p>
      <pre><code class="language-cpp">
map&lt;ll,ll&gt; prime_factorization(ll N) {
  map&lt;ll,ll&gt; res;
  for (ll i = 2; i*i <= N; i++) {
    while (N % i == 0) {
      res[i]++;
      N /= i;
    }
  }
  if (N != 1) res[N]++;
  return res;
}
      </code></pre>
